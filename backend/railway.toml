[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "node --use-system-ca src/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Variáveis de ambiente definidas no dashboard do Railway:
# NODE_ENV=production
# PORT=3000
# SUPABASE_URL=...
# SUPABASE_KEY=...
# FIREBASE_PROJECT_ID=...
# OPENAI_API_KEY=...
# TELEGRAM_BOT_TOKEN=...
# STRIPE_SECRET_KEY=...
# STRIPE_WEBHOOK_SECRET=...
# STRIPE_PRICE_ID=...
# FRONTEND_URL=https://seu-projeto.vercel.app
# CORS_ORIGIN=https://seu-projeto.vercel.app
